site_name: GenJAX
site_description: A JAX-based probabilistic programming language with programmable inference
site_author: GenJAX Contributors
site_url: https://femtomc.github.io/genjax/
repo_name: femtomc/genjax
repo_url: https://github.com/femtomc/genjax

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_signature_annotations: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_root_heading: true
            show_root_full_path: false
            merge_init_into_class: true
            separate_signature: true
            line_length: 80
  - markdown-exec:
      ansi: required

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - footnotes
  - toc:
      permalink: true
  - attr_list
  - md_in_html

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  mathjax:
    tex:
      inlineMath: [["$", "$"], ["\\(", "\\)"]]
      displayMath: [["$$", "$$"], ["\\[", "\\]"]]

nav:
  - Home: index.md
  - API Reference:
    - Overview: reference/index.md
    - genjax.core: reference/core.md
    - genjax.distributions: reference/distributions.md
    - genjax.inference.mcmc: reference/mcmc.md
    - genjax.inference.smc: reference/smc.md
    - genjax.pjax: reference/pjax.md
    - genjax.adev: reference/adev.md
    - genjax.state: reference/state.md
    - genjax.sp: reference/sp.md